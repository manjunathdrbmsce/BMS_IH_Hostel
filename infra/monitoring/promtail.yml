# BMS Hostel — Promtail Configuration (Log Shipper → Loki)
server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # Docker container logs
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
        filters:
          - name: name
            values:
              - 'bms_.*'
    relabel_configs:
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: 'container'
      - source_labels: ['__meta_docker_container_log_stream']
        target_label: 'stream'
    pipeline_stages:
      - docker: {}
      - json:
          expressions:
            level: level
            msg: message
            context: context
      - labels:
          level:
          context:

  # Nginx access logs (JSON format)
  - job_name: nginx
    static_configs:
      - targets:
          - localhost
        labels:
          job: nginx
          __path__: /var/log/nginx/access.log
    pipeline_stages:
      - json:
          expressions:
            method: method
            uri: uri
            status: status
            request_time: request_time
      - labels:
          method:
          status:
      - metrics:
          nginx_request_duration:
            type: Histogram
            description: 'Nginx request duration'
            source: request_time
            config:
              buckets: [0.01, 0.05, 0.1, 0.25, 0.5, 1.0, 2.5, 5.0]

  # Nginx error logs
  - job_name: nginx-errors
    static_configs:
      - targets:
          - localhost
        labels:
          job: nginx-errors
          __path__: /var/log/nginx/error.log
