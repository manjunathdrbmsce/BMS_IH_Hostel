# BMS Hostel — Prometheus Alert Rules
groups:
  - name: bms_api
    interval: 30s
    rules:
      - alert: APIDown
        expr: up{job="bms-api"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: 'BMS API is down'
          description: 'The BMS Hostel API has been unreachable for more than 1 minute.'

      - alert: APIHighResponseTime
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket{job="bms-api"}[5m])) > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: 'API p95 response time exceeds 2s'
          description: 'The 95th percentile API response time has been above 2 seconds for 5 minutes.'

      - alert: APIHighErrorRate
        expr: rate(http_requests_total{job="bms-api",status=~"5.."}[5m]) / rate(http_requests_total{job="bms-api"}[5m]) > 0.05
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: 'API error rate exceeds 5%'
          description: 'More than 5% of API requests are returning 5xx errors.'

  - name: bms_database
    interval: 30s
    rules:
      - alert: PostgresDown
        expr: up{job="postgres"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: 'PostgreSQL is down'

      - alert: PostgresHighConnections
        expr: pg_stat_activity_count > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: 'PostgreSQL connections above 80%'
          description: 'Database is using {{ $value }} of 100 max connections.'

      - alert: PostgresSlowQueries
        expr: pg_stat_activity_max_tx_duration{datname="bms_hostel"} > 60
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: 'Long-running PostgreSQL transaction detected'
          description: 'A transaction has been running for over 60 seconds.'

      - alert: PostgresDiskSpace
        expr: pg_database_size_bytes{datname="bms_hostel"} > 5e9
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: 'Database size exceeds 5GB'

  - name: bms_redis
    interval: 30s
    rules:
      - alert: RedisDown
        expr: up{job="redis"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: 'Redis is down'

      - alert: RedisHighMemory
        expr: redis_memory_used_bytes / redis_memory_max_bytes > 0.85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: 'Redis memory usage above 85%'

  - name: bms_infrastructure
    interval: 30s
    rules:
      - alert: ContainerHighCPU
        expr: rate(container_cpu_usage_seconds_total{name=~"bms_.*"}[5m]) > 0.8
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: 'Container {{ $labels.name }} CPU usage above 80%'

      - alert: ContainerHighMemory
        expr: container_memory_usage_bytes{name=~"bms_.*"} / container_spec_memory_limit_bytes{name=~"bms_.*"} > 0.85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: 'Container {{ $labels.name }} memory usage above 85%'

      - alert: ContainerRestarting
        expr: increase(container_restart_count{name=~"bms_.*"}[1h]) > 3
        labels:
          severity: critical
        annotations:
          summary: 'Container {{ $labels.name }} restarted {{ $value }} times in the last hour'
