# =============================================================================
# BMS Hostel — Nginx Virtual Hosts
# =============================================================================

# ─── Health Check (internal) ──────────────────────────────────────────────────
server {
    listen 80;
    server_name _;

    location /health {
        access_log off;
        return 200 'OK';
        add_header Content-Type text/plain;
    }

    # Redirect all HTTP to HTTPS (uncomment when SSL is configured)
    # location / {
    #     return 301 https://$host$request_uri;
    # }
}

# ─── API Server ──────────────────────────────────────────────────────────────
server {
    listen 80;
    # listen 443 ssl http2;
    server_name api.bms.hostel;

    # SSL (uncomment when certs are ready)
    # ssl_certificate     /etc/nginx/ssl/api.crt;
    # ssl_certificate_key /etc/nginx/ssl/api.key;
    # ssl_protocols       TLSv1.2 TLSv1.3;
    # ssl_ciphers         HIGH:!aNULL:!MD5;
    # ssl_session_cache   shared:SSL:10m;
    # ssl_session_timeout 10m;

    # Security headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # API proxy
    location /api/ {
        limit_req zone=api_general burst=20 nodelay;

        proxy_pass http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;

        proxy_buffering on;
        proxy_buffer_size 8k;
        proxy_buffers 8 8k;
    }

    # Auth endpoints — stricter rate limit
    location /api/v1/auth/ {
        limit_req zone=api_auth burst=3 nodelay;

        proxy_pass http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    # Swagger docs (disabled in production by default)
    location /api/docs {
        # Uncomment to enable Swagger in production:
        # proxy_pass http://api_backend;
        return 404;
    }

    # File uploads
    location /api/v1/uploads/ {
        proxy_pass http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        client_max_body_size 25M;
        proxy_request_buffering off;
    }
}

# ─── Web Dashboard ───────────────────────────────────────────────────────────
server {
    listen 80;
    # listen 443 ssl http2;
    server_name bms.hostel;

    # SSL (uncomment when certs are ready)
    # ssl_certificate     /etc/nginx/ssl/web.crt;
    # ssl_certificate_key /etc/nginx/ssl/web.key;
    # ssl_protocols       TLSv1.2 TLSv1.3;
    # ssl_ciphers         HIGH:!aNULL:!MD5;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location / {
        limit_req zone=web_general burst=30 nodelay;

        proxy_pass http://web_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Static assets caching
    location /_next/static/ {
        proxy_pass http://web_frontend;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
}

# ─── Grafana Monitoring ──────────────────────────────────────────────────────
server {
    listen 80;
    # listen 443 ssl http2;
    server_name monitor.bms.hostel;

    # SSL (uncomment when certs are ready)
    # ssl_certificate     /etc/nginx/ssl/monitor.crt;
    # ssl_certificate_key /etc/nginx/ssl/monitor.key;

    # IP whitelist for monitoring (uncomment and configure)
    # allow 10.0.0.0/8;
    # allow 172.16.0.0/12;
    # deny all;

    location / {
        proxy_pass http://grafana_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
