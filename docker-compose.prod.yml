# =============================================================================
# BMS Hostel — Production Docker Compose
# Full stack: API + Web + PostgreSQL + Redis + Nginx + Monitoring
# =============================================================================
# Usage: docker compose -f docker-compose.prod.yml --env-file .env.production up -d

services:
  # ---------------------------------------------------------------------------
  # Reverse Proxy & TLS Termination
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:1.27-alpine
    container_name: bms_nginx
    restart: unless-stopped
    ports:
      - '${NGINX_HTTP_PORT:-80}:80'
      - '${NGINX_HTTPS_PORT:-443}:443'
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./infra/nginx/ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_healthy
    networks:
      - bms_network
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost/health']
      interval: 15s
      timeout: 5s
      retries: 3

  # ---------------------------------------------------------------------------
  # NestJS API
  # ---------------------------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: bms_api
    restart: unless-stopped
    env_file: .env.production
    environment:
      - NODE_ENV=production
      - DB_HOST=postgres
      - DB_PORT=5432
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    expose:
      - '3001'
    volumes:
      - api_uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - bms_network
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

  # ---------------------------------------------------------------------------
  # Next.js Web Dashboard
  # ---------------------------------------------------------------------------
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: bms_web
    restart: unless-stopped
    env_file: .env.production
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=${API_PUBLIC_URL:-https://api.bms.hostel}
    expose:
      - '3000'
    depends_on:
      api:
        condition: service_healthy
    networks:
      - bms_network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 128M

  # ---------------------------------------------------------------------------
  # PostgreSQL 16
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: bms_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_INITDB_ARGS: '--auth-host=scram-sha-256'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - postgres_backups:/backups
      - ./infra/postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    expose:
      - '5432'
    networks:
      - bms_network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER} -d ${DB_NAME}']
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 512M

  # ---------------------------------------------------------------------------
  # Redis 7 (Cache + BullMQ)
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: bms_redis
    restart: unless-stopped
    command: >
      redis-server
        --requirepass ${REDIS_PASSWORD}
        --maxmemory 128mb
        --maxmemory-policy allkeys-lru
        --appendonly yes
        --appendfsync everysec
    volumes:
      - redis_data:/data
    expose:
      - '6379'
    networks:
      - bms_network
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD}', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  # ---------------------------------------------------------------------------
  # Database Backup (Scheduled)
  # ---------------------------------------------------------------------------
  db-backup:
    image: prodrigestivill/postgres-backup-local:16
    container_name: bms_db_backup
    restart: unless-stopped
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      SCHEDULE: '@daily'
      BACKUP_KEEP_DAYS: 14
      BACKUP_KEEP_WEEKS: 4
      BACKUP_KEEP_MONTHS: 6
      HEALTHCHECK_PORT: 8080
    volumes:
      - postgres_backups:/backups
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - bms_network

  # ---------------------------------------------------------------------------
  # Monitoring: Prometheus
  # ---------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: bms_prometheus
    restart: unless-stopped
    volumes:
      - ./infra/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./infra/monitoring/alert-rules.yml:/etc/prometheus/alert-rules.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
    expose:
      - '9090'
    networks:
      - bms_network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  # ---------------------------------------------------------------------------
  # Monitoring: Grafana
  # ---------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:11.1.0
    container_name: bms_grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD}
      GF_SERVER_ROOT_URL: ${GRAFANA_URL:-http://localhost:3002}
      GF_INSTALL_PLUGINS: grafana-clock-panel
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    expose:
      - '3000'
    depends_on:
      - prometheus
      - loki
    networks:
      - bms_network
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M

  # ---------------------------------------------------------------------------
  # Log Aggregation: Loki
  # ---------------------------------------------------------------------------
  loki:
    image: grafana/loki:2.9.10
    container_name: bms_loki
    restart: unless-stopped
    volumes:
      - ./infra/monitoring/loki.yml:/etc/loki/loki.yml:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/loki.yml
    expose:
      - '3100'
    networks:
      - bms_network

  # ---------------------------------------------------------------------------
  # Log Shipper: Promtail
  # ---------------------------------------------------------------------------
  promtail:
    image: grafana/promtail:2.9.10
    container_name: bms_promtail
    restart: unless-stopped
    volumes:
      - ./infra/monitoring/promtail.yml:/etc/promtail/promtail.yml:ro
      - nginx_logs:/var/log/nginx:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: -config.file=/etc/promtail/promtail.yml
    depends_on:
      - loki
    networks:
      - bms_network

  # ---------------------------------------------------------------------------
  # Node Metrics Exporter (cAdvisor)
  # ---------------------------------------------------------------------------
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: bms_cadvisor
    restart: unless-stopped
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    expose:
      - '8080'
    networks:
      - bms_network
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M

  # ---------------------------------------------------------------------------
  # PostgreSQL Metrics Exporter
  # ---------------------------------------------------------------------------
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: bms_pg_exporter
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}?sslmode=disable
    expose:
      - '9187'
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - bms_network

  # ---------------------------------------------------------------------------
  # Redis Metrics Exporter
  # ---------------------------------------------------------------------------
  redis-exporter:
    image: oliver006/redis_exporter:v1.63.0
    container_name: bms_redis_exporter
    restart: unless-stopped
    environment:
      REDIS_ADDR: redis://redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    expose:
      - '9121'
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - bms_network

networks:
  bms_network:
    driver: bridge

volumes:
  postgres_data:
  postgres_backups:
  redis_data:
  api_uploads:
  prometheus_data:
  grafana_data:
  loki_data:
  nginx_logs:
